# Tunnlo Example: Security Monitor
# Captures network traffic via tshark, filters suspicious activity,
# and sends alerts to an LLM for autonomous triage.
# Demonstrates: tshark adapter, content-filter, dedup, rate-limiter.
#
# Usage (requires root/sudo for tshark capture):
#   sudo npx tunnlo start examples/security-monitor.yaml
#
# Prerequisites:
#   - tshark installed (apt install tshark / brew install wireshark)
#   - Ollama running locally (ollama serve)
#   - Update 'interface' below to match your network interface (en0, eth0, etc.)

sources:
  - id: wireshark-capture
    adapter: native/tshark
    config:
      interface: en0
      capture_filter: "tcp port 80 or tcp port 443 or tcp port 22"
      output_format: json

filters:
  # Flag SYN packets and connections to sensitive ports
  - type: content-filter
    rules:
      - field: payload.flags
        match: "SYN"
      - field: payload.dst_port
        in: [22, 3389, 445, 23]
    mode: any

  # Deduplicate by source IP + destination port
  - type: dedup
    window_seconds: 30
    key_fields:
      - payload.src_ip
      - payload.dst_port

  - type: rate-limiter
    max_events_per_minute: 20

agent:
  runtime: direct-llm
  model: ollama/llama3.1:8b
  system_prompt: |
    You are a security monitoring agent analyzing network traffic events from tshark.

    For each event, assess:
    1. Is this normal traffic or potentially suspicious?
    2. What kind of activity does this represent (port scan, brute force, data exfil, etc.)?
    3. Should an alert be raised? At what severity?

    Be concise. Focus on actionable insights.
  token_budget:
    max_per_hour: 100000
    max_per_event: 4000

behavior:
  on_llm_unreachable: drop_and_alert
